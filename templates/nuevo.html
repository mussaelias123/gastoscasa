{# Formulario completo para agregar un movimiento (alternativa a la carga rápida) #}

{% extends 'base.html' %}

{% block titulo %}Nuevo Movimiento — Saldos{% endblock %}

{% block contenido %}

<div class="pagina-header">
  <h2>➕ Nuevo Movimiento</h2>
  <a href="{{ url_for('index') }}" class="btn btn-secundario">← Volver</a>
</div>

<form action="{{ url_for('agregar') }}" method="POST" class="formulario-gasto">

  <div class="campo">
    <label for="fecha">📅 Fecha</label>
    <input type="date" id="fecha" name="fecha" required>
  </div>

  <div class="campo">
    <label for="descripcion">📝 Descripción</label>
    <input type="text" id="descripcion" name="descripcion"
           placeholder="Ej: Sueldo, Supermercado, Alquiler..."
           maxlength="200" required>
  </div>

  <div class="campo">
    <label for="persona">👤 Persona</label>
    <select id="persona" name="persona" required>
      <option value="">-- Seleccioná --</option>
      <option value="elias">Elías</option>
      <option value="mari">Mari</option>
    </select>
  </div>

  <div class="campo">
    <label for="moneda">💱 Moneda</label>
    <select id="moneda" name="moneda" required>
      <option value="">-- Seleccioná --</option>
      <option value="ars">AR$ — Pesos argentinos</option>
      <option value="usd">USD — Dólares</option>
    </select>
  </div>

  <div class="campo">
    <label for="tipo">↕️ Tipo</label>
    <select id="tipo" name="tipo" required>
      <option value="">-- Seleccioná --</option>
      <option value="ingreso">Ingreso (suma al saldo)</option>
      <option value="gasto">Gasto (resta al saldo)</option>
    </select>
  </div>

  <div class="campo">
    <label for="monto-display">💰 Monto</label>
    <input type="text" id="monto-display"
           placeholder="0" maxlength="16"
           inputmode="numeric" autocomplete="off" required>
    <input type="hidden" id="monto" name="monto">
  </div>

  <div class="campo campo-botones">
    <button type="submit" class="btn btn-primario">💾 Guardar</button>
    <button type="button"
            onclick="window.location.href='{{ url_for('index') }}'"
            class="btn btn-secundario">
      ✖ Cancelar
    </button>
  </div>

</form>

{% endblock %}
